<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Courtroom - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0b0b0e; color: #e4e4e7; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #141419; }
        ::-webkit-scrollbar-thumb { background: #b45309; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Dashboard Header -->
    <div class="flex flex-col md:flex-row items-center justify-between border-b border-zinc-800 pb-6 mb-8 gap-4">
        <div class="flex items-center gap-4 text-center md:text-left flex-col md:flex-row w-full max-w-xl">
            <img src="court_banner.png" alt="The Royal Court" class="w-24 h-16 rounded border border-amber-600/30 object-cover shadow-md">
            <div>
                <h1 class="text-xl font-bold tracking-wider text-amber-500 uppercase font-serif">Court Records Dashboard</h1>
                <p class="text-zinc-400 text-xs italic mt-0.5">Logged in as: <span class="text-red-400 font-semibold font-mono">HELL (The Judge)</span></p>
            </div>
        </div>
        
        <!-- Today's Brief -->
        <div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-lg text-sm min-w-[200px] w-full md:w-auto">
            <span class="text-xs font-bold text-zinc-500 uppercase block mb-1">Today's Legal Brief</span>
            <div class="flex justify-between text-xs text-zinc-300">
                <span>Total Reports: <strong class="text-amber-500" id="totalCount">0</strong></span>
                <span>Pending: <strong class="text-red-400" id="pendingCount">0</strong></span>
            </div>
        </div>
    </div>

    <!-- Records Table -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl overflow-hidden">
        <div class="overflow-x-auto w-full">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead>
                    <tr class="bg-zinc-950 border-b border-zinc-800 text-[11px] font-bold uppercase tracking-wider text-zinc-400">
                        <th class="p-4 w-24">Serial No.</th>
                        <th class="p-4 w-32">Date</th>
                        <th class="p-4">Plaintiff Details</th>
                        <th class="p-4">Defendant Details</th>
                        <th class="p-4">Violation Type</th>
                        <th class="p-4 max-w-xs">Notes / Demands</th>
                        <th class="p-4 w-28 text-center">Evidence</th>
                        <th class="p-4 w-64">Action Taken (Admin Only)</th>
                    </tr>
                </thead>
                <tbody id="recordsTableBody" class="divide-y divide-zinc-800/50 text-xs">
                    <tr><td colspan="8" class="p-4 text-center text-zinc-500">Summoning records from scroll...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC5kSFhwskwBI60dPq1VsI2jdIJpWtMSMY",
            authDomain: "k1269-98ae8.firebaseapp.com",
            projectId: "k1269-98ae8",
            storageBucket: "k1269-98ae8.firebasestorage.app",
            messagingSenderId: "1083795874753",
            appId: "1:1083795874753:web:bd21c5aeb0484a660f8540"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load and Realtime Update Records
        db.collection('complaints').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
            const tbody = document.getElementById('recordsTableBody');
            tbody.innerHTML = "";
            
            let total = 0;
            let pending = 0;

            if(snapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-4 text-center text-zinc-600">No cases found in court files.</td></tr>`;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                total++;
                if (data.actionTaken === "Pending review" || !data.actionTaken) pending++;

                const row = document.createElement('tr');
                row.className = "hover:bg-zinc-950/40 transition";
                row.innerHTML = `
                    <td class="p-4 font-mono text-amber-600 font-bold">#${data.serialNo || total}</td>
                    <td class="p-4 text-zinc-400 font-mono">${data.date}</td>
                    <td class="p-4">
                        <div class="font-semibold text-zinc-200">${data.pName}</div>
                        <div class="text-[10px] text-zinc-500">[${data.pAlliance}] ID: ${data.pID}</div>
                    </td>
                    <td class="p-4">
                        <div class="font-semibold text-red-400">${data.dName}</div>
                        <div class="text-[10px] text-zinc-500">[${data.dAlliance}] ID: ${data.dID}</div>
                    </td>
                    <td class="p-4 text-amber-500/90 font-medium max-w-[180px] truncate" title="${data.violationType}">${data.violationType}</td>
                    <td class="p-4 text-zinc-400 max-w-xs break-words">${data.notes || '-'}</td>
                    <td class="p-4 text-center">
                        <a href="${data.evidenceUrl}" target="_blank" class="text-amber-500 hover:underline font-semibold text-[11px] uppercase tracking-wider">View Link</a>
                    </td>
                    <td class="p-4">
                        <div class="flex gap-2">
                            <input type="text" id="input-${doc.id}" value="${data.actionTaken || ''}" class="bg-zinc-950 border border-zinc-800 rounded p-1 text-xs w-full text-zinc-300 focus:outline-none focus:border-amber-600">
                            <button onclick="updateAction('${doc.id}')" class="bg-amber-700 hover:bg-amber-600 text-white font-bold px-2 py-1 rounded text-[10px] uppercase cursor-pointer transition">Save</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalCount').innerText = total;
            document.getElementById('pendingCount').innerText = pending;
        });

        // Function to update judge's judgment
        async function updateAction(id) {
            const val = document.getElementById(`input-${id}`).value;
            try {
                await db.collection('complaints').doc(id).update({
                    actionTaken: val
                });
                alert("Verdict updated on cloud scroll!");
            } catch (e) {
                alert("Error updating decision.");
            }
        }
    </script>
</body>
</html>
